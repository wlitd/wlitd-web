shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver

catalogs:
  build:
    vite: ^8.1.3

  charts:
    echarts: ^6.1.0
    vue-echarts: ^8.0.1

  css:
    unocss: ^66.7.4

  frontend:
    pinia: ^3.0.4
    vue: ^3.5.39
    vue-i18n: ^11.4.6
    vue-router: ^5.1.0

  icons:
    '@iconify-json/flag': ^1.2.12
    '@iconify-json/icon-park-outline': ^1.2.4
    '@iconify-json/line-md': ^1.2.16
    '@iconify-json/lucide': ^1.2.116
    '@iconify-json/mdi': ^1.2.3
    '@iconify-json/streamline-ultimate': ^1.2.2

  lint:
    '@antfu/eslint-config': ^9.1.0
    eslint: ^10.6.0

  plugins:
    '@intlify/unplugin-vue-i18n': ^11.2.4
    '@vitejs/plugin-vue': ^6.0.7
    '@vitejs/plugin-vue-jsx': ^5.1.6
    pinia-plugin-persistedstate: ^4.7.1
    unplugin-auto-import: ^21.0.0
    unplugin-vue-components: ^32.1.0

  types:
    '@types/node': ^26.1.0
    '@vue/tsconfig': ^0.9.1
    typescript: ^6.0.3

  ui:
    highlight.js: ^11.11.1
    naive-ui: ^2.44.1

  utils:
    '@ctrl/tinycolor': ^4.2.0
    '@vueuse/core': ^14.3.0

allowBuilds:
  esbuild: true
