      <line x1="-1.5" y1="-2.5" x2="1.5" y2="2.5" />
      <line x1="1.5" y1="-2.5" x2="-1.5" y2="2.5" />
      <line x1="-2.5" y1="-1.5" x2="2.5" y2="1.5" />
