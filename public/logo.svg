<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fad0c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a1c4fd;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with gradient - kept unchanged -->
  <rect width="128" height="128" fill="url(#grad1)" rx="20"/>

  <!-- Single folium curve in the middle -->
  <g opacity="0.5">
    <path d="M20,64 C40,40 88,40 108,64 C88,88 40,88 20,64" stroke="#ffffff" stroke-width="1" fill="none"/>
  </g>
  
  <!-- Artistic 'W' in the center as a text element with larger size -->
  <g transform="translate(64,64)">
    <text x="0" y="18" text-anchor="middle" font-family="'Comic Sans MS', cursive, sans-serif" font-size="64" fill="#ffffff" opacity="0.95" font-weight="bold">W</text>
  </g>
  
  <!-- Randomly distributed snowflakes -->
  <g opacity="0.7">
    <!-- Large snowflake -->
    <g transform="translate(30,25)" stroke="#ffffff" stroke-width="0.8" fill="none">
      <line x1="0" y1="-6" x2="0" y2="6" />
      <line x1="-3" y1="-5" x2="3" y2="5" />
      <line x1="3" y1="-5" x2="-3" y2="5" />
      <line x1="-5" y1="-3" x2="5" y2="3" />
      <line x1="-5" y1="3" x2="5" y2="-3" />
      <line x1="-6" y1="0" x2="6" y2="0" />
    </g>
    
    <!-- Medium snowflake -->
    <g transform="translate(85,15)" stroke="#ffffff" stroke-width="0.7" fill="none">
      <line x1="0" y1="-4" x2="0" y2="4" />
      <line x1="-2" y1="-3.5" x2="2" y2="3.5" />
      <line x1="2" y1="-3.5" x2="-2" y2="3.5" />
      <line x1="-3.5" y1="-2" x2="3.5" y2="2" />
      <line x1="-3.5" y1="2" x2="3.5" y2="-2" />
      <line x1="-4" y1="0" x2="4" y2="0" />
    </g>
    
    <!-- Medium snowflake -->
