      <line x1="-2" y1="-3.5" x2="2" y2="3.5" />
      <line x1="2" y1="-3.5" x2="-2" y2="3.5" />
      <line x1="-3.5" y1="-2" x2="3.5" y2="2" />
      <line x1="-3.5" y1="2" x2="3.5" y2="-2" />
      <line x1="-4" y1="0" x2="4" y2="0" />
    </g>
    
    <!-- Small snowflake -->
    <g transform="translate(60,45)" stroke="#ffffff" stroke-width="0.6" fill="none">
      <line x1="0" y1="-3" x2="0" y2="3" />
      <line x1="-1.5" y1="-2.5" x2="1.5" y2="2.5" />
      <line x1="1.5" y1="-2.5" x2="-1.5" y2="2.5" />
